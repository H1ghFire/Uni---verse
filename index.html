<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-verse</title>
    <!-- 🔗 Linking our separate stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🌌 Dynamic Space Tornado Background Layer -->
    <div id="vortexContainer" class="vortex-container"></div>

    <!-- 🎫 CUSTOM MOCK LOGIN MODAL POPUP -->
    <div id="loginModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2>Create Your Uni-verse Profile</h2>
            <div class="modal-form">
                <label for="usernameInput">Display Name / Nickname</label>
                <input type="text" id="usernameInput" placeholder="e.g., StarStudent">
                
                <label>Select Your Cosmic Avatar</label>
                <div class="avatar-selector">
                    <span class="avatar-option selected" onclick="selectAvatar(this)">🚀</span>
                    <span class="avatar-option" onclick="selectAvatar(this)">🪐</span>
                    <span class="avatar-option" onclick="selectAvatar(this)">☄️</span>
                    <span class="avatar-option" onclick="selectAvatar(this)">👾</span>
                </div>

                <button class="modal-submit-btn" onclick="submitMockLogin()">Launch Into Dashboard</button>
                <button class="modal-close-btn" onclick="closeLoginModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Top Navigation Header -->
    <header class="main-header">
        <div class="nav-left">
            <button id="navHomeBtn" class="nav-brand-btn" onclick="showHomeScreen()">← Main Page</button>
        </div>
        <div class="nav-right" id="authNavContainer">
            <a href="#" id="profileLink" onclick="navigateToProfile()">Profile</a>
        </div>
    </header>

    <!-- 🪐 SCREEN 1: LANDING HOME SCREEN -->
    <div id="homeScreen" class="welcome-container">
        <!-- Large Hero Welcome Box -->
        <div class="hero-box">
            <h1>Welcome to the universe</h1>
        </div>

        <!-- Action Buttons Row -->
        <div class="btn-group">
            <button id="mainLoginBtn" class="action-btn" onclick="openLoginModal()">Sign up / Login</button>
            <button class="action-btn secondary" onclick="showAboutUs()">About us</button>
        </div>
    </div>

    <!-- 🖥️ SCREEN 2: MAIN APPLICATION DASHBOARD (Hidden on startup) -->
    <div id="mainDashboard" class="dashboard-container hidden">
        <div class="dashboard-grid">
            
            <!-- Left Side: Filter Control Panel -->
            <section class="panel search-panel">
                <h2>Filters</h2>
                
                <div class="filter-group">
                    <label for="countryFilter">Target Destination</label>
                    <select id="countryFilter" onchange="filterUniversities()">
                        <option value="all">Anywhere (Global)</option>
                        <option value="USA">United States</option>
                        <option value="Netherlands">Netherlands</option>
                        <option value="Germany">Germany</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="satEbrwFilter">SAT Reading & Writing</label>
                    <input type="number" id="satEbrwFilter" min="200" max="800" step="10" value="600" oninput="updateValues(); filterUniversities();">
                </div>

                <div class="filter-group">
                    <label for="satMathFilter">SAT Math</label>
                    <input type="number" id="satMathFilter" min="200" max="800" step="10" value="600" oninput="updateValues(); filterUniversities();">
                </div>

                <div class="filter-group">
                    <label>Calculated Total SAT</label>
                    <div class="total-display-box">
                        <span id="satTotalVal">1200</span>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="ieltsFilter">Your IELTS Band</label>
                    <input type="number" id="ieltsFilter" min="4.0" max="9.0" step="0.5" value="6.0" oninput="updateValues(); filterUniversities();">
                </div>
            </section>

            <!-- Right Side: Matching Matrix Container -->
            <section class="panel display-panel">
                <h2>Matching Universities</h2>
                <div class="results-grid" id="results"></div>
            </section>

        </div>
    </div>

    <!-- 🔗 Restored our fast, standard layout scripting linkages -->
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
