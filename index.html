<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - Global University Finder</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --total-box: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 { margin-bottom: 0.5rem; color: var(--accent); }
        p { color: var(--text-muted); margin: 0; }

        /* Sidebar/Filter Styles */
        .search-panel {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #334155;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .total-display-box {
            background-color: var(--total-box);
            border-radius: 6px;
            padding: 0.5rem;
            text-align: center;
            border: 1px dashed var(--accent);
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        select, input[type="range"] {
            width: 100%;
            background: #0f172a;
            color: white;
            border: 1px solid #475569;
            padding: 0.5rem;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .value-display {
            font-weight: bold;
            color: var(--accent);
            text-align: right;
            font-size: 0.85rem;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .uni-card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s;
        }

        .uni-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .uni-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .uni-country { color: var(--accent); font-size: 0.9rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em;}
        
        .req-tag {
            display: flex;
            justify-content: space-between;
            padding: 0.35rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #334155;
        }
        .req-tag:last-child { border: none; }
        .req-val { font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>UniMatch</h1>
        <p>Granular SAT sections tracking. Instant validation.</p>
    </header>

    <div class="search-panel">
        <div class="filter-group">
            <label for="countryFilter">Target Destination</label>
            <select id="countryFilter" onchange="filterUniversities()">
                <option value="all">Anywhere (Global)</option>
                <option value="USA">United States</option>
                <option value="Netherlands">Netherlands</option>
                <option value="Germany">Germany</option>
            </select>
        </div>

        <div class="filter-group">
            <div style="display: flex; justify-content: space-between;">
                <label for="satEbrwFilter">SAT Reading & Writing</label>
                <span id="satEbrwVal" class="value-display">600</span>
            </div>
            <input type="range" id="satEbrwFilter" min="200" max="800" step="10" value="600" oninput="updateValues(); filterUniversities();">
        </div>

        <div class="filter-group">
            <div style="display: flex; justify-content: space-between;">
                <label for="satMathFilter">SAT Math</label>
                <span id="satMathVal" class="value-display">600</span>
            </div>
            <input type="range" id="satMathFilter" min="200" max="800" step="10" value="600" oninput="updateValues(); filterUniversities();">
        </div>

        <div class="filter-group">
            <label>Calculated Total SAT</label>
            <div class="total-display-box">
                <span id="satTotalVal" style="font-weight: bold; color: #4ade80; font-size: 1.1rem;">1200</span>
            </div>
        </div>

        <div class="filter-group">
            <div style="display: flex; justify-content: space-between;">
                <label for="ieltsFilter">Your IELTS Band</label>
                <span id="ieltsVal" class="value-display">6.0</span>
            </div>
            <input type="range" id="ieltsFilter" min="4.0" max="9.0" step="0.5" value="6.0" oninput="updateValues(); filterUniversities();">
        </div>
    </div>

    <div class="results-grid" id="results">
        </div>
</div>

<script>
    // 1. Mock University Database (Updated with section breakdowns)
    // Some tech schools might have higher math minimums!
    const universities = [
        { name: "Stanford University", country: "USA", minEbrw: 720, minMath: 750, minIelts: 7.0, fee: "$62,000" },
        { name: "Penn State University", country: "USA", minEbrw: 580, minMath: 620, minIelts: 6.5, fee: "$39,000" },
        { name: "University of Amsterdam", country: "Netherlands", minEbrw: 0, minMath: 0, minIelts: 6.5, fee: "€15,000" },
        { name: "Eindhoven Tech", country: "Netherlands", minEbrw: 0, minMath: 0, minIelts: 6.0, fee: "€12,500" },
        { name: "Technical University of Munich", country: "Germany", minEbrw: 0, minMath: 0, minIelts: 6.5, fee: "€0 (Free)" },
        { name: "Arizona State University", country: "USA", minEbrw: 540, minMath: 560, minIelts: 6.0, fee: "$31,000" }
    ];

    // 2. Sync UI labels and calculate total SAT dynamically
    function updateValues() {
        const ebrw = parseInt(document.getElementById('satEbrwFilter').value);
        const math = parseInt(document.getElementById('satMathFilter').value);
        
        document.getElementById('satEbrwVal').innerText = ebrw;
        document.getElementById('satMathVal').innerText = math;
        document.getElementById('satTotalVal').innerText = ebrw + math;
        document.getElementById('ieltsVal').innerText = document.getElementById('ieltsFilter').value;
    }

    // 3. Main Filtering Engine
    function filterUniversities() {
        const selectedCountry = document.getElementById('countryFilter').value;
        const userEbrw = parseInt(document.getElementById('satEbrwFilter').value);
        const userMath = parseInt(document.getElementById('satMathFilter').value);
        const userIelts = parseFloat(document.getElementById('ieltsFilter').value);
        
        const resultsContainer = document.getElementById('results');
        resultsContainer.innerHTML = ''; 

        const filtered = universities.filter(uni => {
            if (selectedCountry !== 'all' && uni.country !== selectedCountry) return false;
            
            // Validate individual SAT section metrics
            if (uni.minEbrw > 0 && userEbrw < uni.minEbrw) return false;
            if (uni.minMath > 0 && userMath < uni.minMath) return false;
            
            if (uni.minIelts > 0 && userIelts < uni.minIelts) return false;

            return true;
        });

        if (filtered.length === 0) {
            resultsContainer.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">No matches found. Try boosting individual scores or changing destination filters!</p>`;
            return;
        }

        filtered.forEach(uni => {
            const card = document.createElement('div');
            card.className = 'uni-card';
            
            // Display exact breakdown or 'Not Required'
            const satDisplay = uni.minMath === 0 ? 'Not Required' : `EBRW: ${uni.minEbrw} | Math: ${uni.minMath}`;
            
            card.innerHTML = `
                <div class="uni-name">${uni.name}</div>
                <div class="uni-country">${uni.country}</div>
                <div class="req-tag"><span>Min SAT Sections:</span> <span class="req-val">${satDisplay}</span></div>
                <div class="req-tag"><span>Min IELTS:</span> <span class="req-val">${uni.minIelts}</span></div>
                <div class="req-tag"><span>Est. Tuition:</span> <span class="req-val" style="color: #4ade80;">${uni.fee}</span></div>
            `;
            resultsContainer.appendChild(card);
        });
    }

    // Initialize
    updateValues();
    filterUniversities();
</script>

</body>
</html>
