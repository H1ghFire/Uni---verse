<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-verse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation Header containing the Profile link -->
    <header class="main-header">
        <div class="nav-right">
            <a href="#" id="profileLink" onclick="navigateToProfile()">Profile</a>
        </div>
    </header>

    <!-- 🌌 LANDING HOME SCREEN -->
    <div id="homeScreen" class="welcome-container">
        
        <!-- Large Hero Welcome Box -->
        <div class="hero-box">
            <h1>Welcome to the universe</h1>
        </div>

        <!-- Action Buttons Row -->
        <div class="btn-group">
            <button class="action-btn" onclick="handleLogin()">Sign up / Login</button>
            <button class="action-btn secondary" onclick="showAboutUs()">About us</button>
        </div>

    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
